name: "KNX Field Tool"
description: "Ferramenta de campo KNX — explorador de projecto ETS, monitor de grupo e diagnostico de instalacao."
version: "1.16.0"
slug: "knx-field-tool"
url: "https://github.com/le-andreazevedo/knx-field-tool-addon"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

homeassistant_api: false
hassio_api: false

# host_network is required for KNX/IP Tunneling.
# Without it, Docker bridge NAT puts the container's internal IP (172.30.x.x)
# into the KNX/IP HPAI; the gateway then tries to send group telegrams to that
# IP which it cannot reach from the LAN. With host_network the add-on shares
# the HA host's real network interface and xknx detects the correct local IP.
host_network: true

ingress: true
ingress_port: 8765
ingress_stream: true
panel_icon: "mdi:broadcast"
panel_title: "KNX Field Tool"

ports:
  8765/tcp: null

options:
  knx_gateway_host: ""
  knx_gateway_port: 3671
  knx_project_folder: "knx-field-tool"
  knx_project_file: ""
  knx_ping_timeout: 3

schema:
  knx_gateway_host: str
  knx_gateway_port: int
  knx_project_folder: str
  knx_project_file: str
  knx_ping_timeout: int

map:
  - config:ro   # /config — pasta config do HA (para o ficheiro .knxproj)
  - data:rw     # /data   — armazenamento interno do add-on
